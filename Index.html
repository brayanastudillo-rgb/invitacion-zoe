<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Baby Shower Zoe</title>

<style>

body{
margin:0;
font-family:Arial;
background:#ffeaf4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.tarjeta{
max-width:700px;
width:90%;
}

img{
width:100%;
border-radius:20px;
}

button{

margin-top:25px;
padding:18px 40px;
font-size:22px;
border:none;
border-radius:40px;
background:#ff6ec7;
color:white;
cursor:pointer;
animation:pulse 1.6s infinite;

}

@keyframes pulse{

0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}

}

#video{
display:none;
margin-top:20px;
}

#info{
display:none;
margin-top:20px;
font-size:20px;
}

</style>

</head>

<body>

<div class="tarjeta">

<img src="https://drive.google.com/uc?export=view&id=1KdJMQXEzyWoDD4LUJ4WPbpsJRHX1nt-O">

<button onclick="abrirInvitacion()">Abrir invitación</button>

<div id="video">

<video id="videoZoe" width="100%" autoplay controls>

<source src="https://drive.google.com/uc?export=download&id=1cfO3FB4dx7uVtwGtwkv6IHxdelKCnRVs" type="video/mp4">

</video>

</div>

<div id="info">

<h2>Baby Shower Zoe Amaranta</h2>

<p>19 de abril – 3:00 PM</p>

<p>Barrio La Cita</p>

<p>Cra. 6c #171-2 a 171-68</p>

<p>Bogotá</p>

</div>

</div>

<script>

function abrirInvitacion(){

document.querySelector("button").style.display="none"

document.getElementById("video").style.display="block"

var v=document.getElementById("videoZoe")

v.play()

v.onended=function(){

document.getElementById("info").style.display="block"

}

}

</script>

</body>
</html>
